name: photo_finder
description: Event Photo Finder - Search and unlock event photos
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4

  # Navigation
  go_router: ^13.2.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Image
  cached_network_image: ^3.3.1

  # Device Info
  device_info_plus: ^10.1.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Payment - Razorpay
  razorpay_flutter: ^1.3.6

  # HTTP
  http: ^1.2.1

  # UUID
  uuid: ^4.4.0

  # Shared Preferences
  shared_preferences: ^2.2.3

  # Permission Handler
  permission_handler: ^11.3.1

  # WebView (for Razorpay)
  webview_flutter: ^4.7.0

  # Gallery Saver
  gal: ^2.3.2

  cupertino_icons: ^1.0.6
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
